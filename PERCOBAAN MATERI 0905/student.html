<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tong Yi · Dashboard Murid</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
:root{
  --bl:#1565C0;--bl2:#1976D2;--bll:#E3F2FD;--bld:#0D47A1;
  --go:#F9A825;--gol:#FFF8E1;--god:#E65100;
  --te:#00695C;--tel:#E0F2F1;
  --re:#C62828;--rel:#FFEBEE;
  --gr:#2E7D32;--grl:#E8F5E9;
  --gy:#546E7A;--gyl:#ECEFF1;--dk:#0D1B2A;
  --rd:14px;--s1:0 4px 24px rgba(21,101,192,.12);--s2:0 8px 40px rgba(21,101,192,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F6FF;color:var(--dk)}
button,input,select,textarea{font-family:inherit}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;
  font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.btn-bl{background:var(--bl);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,.3)}
.btn-bl:hover{background:var(--bld);transform:translateY(-1px)}
.btn-go{background:var(--go);color:var(--dk)}
.btn-go:hover{background:#FFB300}
.btn-out{background:#fff;color:var(--bl);border:2px solid var(--bl)}
.btn-out:hover{background:var(--bll)}
.btn-re{background:var(--re);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}
.inp{width:100%;padding:11px 14px;border-radius:10px;border:2px solid var(--gyl);
  font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.inp:focus{border-color:var(--bl)}
.fg{margin-bottom:16px}
.fg label{font-size:13px;font-weight:700;color:var(--gy);margin-bottom:6px;display:block}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-bl{background:var(--bll);color:var(--bl)}
.b-go{background:var(--gol);color:var(--god)}
.b-gr{background:var(--grl);color:var(--gr)}
.b-gy{background:var(--gyl);color:var(--gy)}
.b-re{background:var(--rel);color:var(--re)}
.card{background:#fff;border-radius:var(--rd);box-shadow:var(--s1);padding:24px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;display:none;
  align-items:center;gap:8px;margin-bottom:14px}
.alert.err{background:var(--rel);color:var(--re);border:1px solid #FFCDD2}
.alert.ok{background:var(--grl);color:var(--gr);border:1px solid #C8E6C9}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

.bar{background:linear-gradient(135deg,var(--bld),var(--bl));position:sticky;top:0;z-index:50;
  box-shadow:0 2px 16px rgba(0,0,0,.2)}
.bar-in{max-width:960px;margin:0 auto;display:flex;align-items:center;
  justify-content:space-between;padding:10px 20px}
.av{width:36px;height:36px;border-radius:50%;background:var(--go);display:flex;
  align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--dk)}
.lo{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 14px;
  border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.lo:hover{background:rgba(255,255,255,.25)}
.main{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.hero{background:linear-gradient(135deg,var(--bl),var(--bl2));border-radius:18px;
  padding:22px 26px;margin-bottom:22px;color:#fff;display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
  box-shadow:var(--s2)}
.hero h2{font-size:19px;font-weight:900;font-family:'Noto Sans SC',sans-serif}
.hs{display:flex;gap:10px}
.hst{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;text-align:center}
.hst .n{font-size:20px;font-weight:900}.hst .l{font-size:11px;opacity:.7;margin-top:2px}
/* tabs */
.tabs{display:flex;gap:4px;background:#fff;border-radius:12px;padding:4px;
  box-shadow:var(--s1);margin-bottom:18px;overflow-x:auto}
.tab{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;color:var(--gy);
  border:none;background:none;white-space:nowrap;cursor:pointer;transition:all .2s}
.tab.on{background:var(--bl);color:#fff}
.tp{display:none}.tp.on{display:block;animation:fi .2s}
/* unit cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.uc{background:#fff;border-radius:var(--rd);box-shadow:var(--s1);overflow:hidden;
  cursor:pointer;transition:transform .2s,box-shadow .2s}
.uc:hover{transform:translateY(-3px);box-shadow:var(--s2)}
.uc.lk{opacity:.5;cursor:not-allowed;pointer-events:none}
.uh{padding:16px 18px;color:#fff;background:linear-gradient(135deg,var(--bl),var(--bl2));position:relative}
.uh.dn{background:linear-gradient(135deg,var(--te),#00796B)}
.ub{padding:13px 16px}
.upr{height:6px;background:var(--gyl);border-radius:3px;margin-bottom:10px;overflow:hidden}
.upr-f{height:100%;background:var(--go);border-radius:3px;transition:width .8s}
/* modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:9999;align-items:center;justify-content:center;padding:20px}
#modal.on{display:flex}
.mb{background:#fff;border-radius:18px;width:100%;max-width:420px;padding:26px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fi .25s}
.mb h3{font-size:17px;font-weight:800;margin-bottom:6px}
.mb p{font-size:13px;color:var(--gy);margin-bottom:18px;line-height:1.7}
/* file buttons */
.fb{display:flex;align-items:center;gap:14px;width:100%;padding:13px 15px;
  margin-bottom:10px;border-radius:12px;border:2px solid var(--bll);
  background:#fff;text-align:left;cursor:pointer;transition:all .2s}
.fb:hover{border-color:var(--bl);background:var(--bll)}
.fb .fi{font-size:26px;flex-shrink:0}
.fb .ft{font-weight:700;font-size:14px;color:var(--dk);display:block}
.fb .fs{font-size:12px;color:var(--gy);display:block;margin-top:2px}
.cb{width:100%;padding:10px;border-radius:10px;border:2px solid var(--gyl);
  background:#fff;color:var(--gy);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.cb:hover{background:var(--gyl)}
/* progress table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--bl);color:#fff;padding:10px 14px;font-size:12px;text-align:left;font-weight:700}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--bll)}
.tbl tr:hover td{background:var(--bll)}
.pb{height:6px;background:var(--gyl);border-radius:3px;width:70px;display:inline-block;overflow:hidden;vertical-align:middle}
.pbf{height:100%;background:var(--go);border-radius:3px}
</style>
</head>

  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="hero">
    <div>
      <h2 id="gr">你好！</h2>
      <p style="font-size:13px;opacity:.8;margin-top:4px">Selamat belajar · 今天也要加油！</p>
    </div>
    <div class="hs">
      <div class="hst"><div class="n" id="h1">0</div><div class="l">Selesai</div></div>
      <div class="hst"><div class="n" id="h2">0%</div><div class="l">Score</div></div>
      <div class="hst"><div class="n" id="h3">0</div><div class="l">Flash</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on"  id="t1" onclick="tab('materi',this)">📚 Materi</button>
    <button class="tab"     id="t2" onclick="tab('progres',this)">📊 Progress</button>
    <button class="tab"     id="t3" onclick="tab('log',this)">🕐 Aktivitas</button>
  </div>

  <div class="tp on" id="tp-materi">
    <div style="font-size:16px;font-weight:800;margin-bottom:14px">📚 Unit Pembelajaran</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="tp" id="tp-progres">
    <div style="font-size:16px;font-weight:800;margin-bottom:14px">📊 Progress Detail</div>
    <div style="background:#fff;border-radius:var(--rd);box-shadow:var(--s1);overflow:hidden">
      <table class="tbl">
        <thead><tr><th>Unit</th><th>Listening</th><th>Reading</th><th>Writing</th><th>Speaking</th><th>Flash</th><th>Total</th></tr></thead>
        <tbody id="ptbl"><tr><td colspan="7" style="text-align:center;padding:20px;color:var(--gy)">Belum ada data</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="tp" id="tp-log">
    <div style="font-size:16px;font-weight:800;margin-bottom:14px">🕐 Riwayat Aktivitas</div>
    <div class="card" id="logbox">Memuat...</div>
  </div>
</div>

<!-- MODAL — langsung di body, z-index 9999 -->
<div id="modal">
  <div class="mb">
    <h3 id="m-title">Unit 1</h3>
    <p id="m-desc">Pilih format:</p>

    <button class="fb" id="btn-html">
      <span class="fi">🌐</span>
      <span>
        <span class="ft">Buka Versi Interaktif (HTML)</span>
        <span class="fs">Flashcard · Latihan · Voice Recorder · buka di tab baru</span>
      </span>
    </button>

    <button class="fb" id="btn-docx">
      <span class="fi">📄</span>
      <span>
        <span class="ft">Download Handbook (.docx)</span>
        <span class="fs">Versi cetak · referensi lengkap</span>
      </span>
    </button>

    <button class="cb" id="btn-close">✕ Tutup</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── INIT ─────────────────────────────────────────────────────────

var _url = 'https://vshhmqthemivfzflqjsa.supabase.co';
var _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzaGhtcXRoZW1pdmZ6ZmxxanNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNDM5NjQsImV4cCI6MjA5MzgxOTk2NH0.uExHVvHLfYTe5BysjJfKxGknaAaMo2U4qAJSLX6vGf8';
var db   = supabase.createClient(_url, _key);


// Ambil session
var raw = localStorage.getItem('ty_session');
if (!raw) { window.location.href = 'index.html'; }
var S = JSON.parse(raw);
// Kalau bukan student, redirect
if (S.role === 'admin') { window.location.href = 'admin.html'; }

// ── UNITS ─────────────────────────────────────────────────────────
var UNITS = [
  {
    id: 1, num: 'Unit 1',
    zh: '打电话与周末计划', en: 'Telephone & Weekend Plans',
    tags: ['HSK 2-3','15 Kata','3 Grammar'],
    html: 'TongYi_Unit1_Interactive.html',
    docx: 'TongYi_Unit1_Handbook.docx',
    on: true
  },
  { id:2, num:'Unit 2', zh:'日常活动',  en:'Daily Activities', tags:['Segera Hadir'], on:false },
  { id:3, num:'Unit 3', zh:'时间与地点', en:'Time & Location',  tags:['Segera Hadir'], on:false }
];

var prog = {};
var sel  = null;

// ── TOPBAR ────────────────────────────────────────────────────────
document.getElementById('av').textContent = (S.full_name||S.username)[0].toUpperCase();
document.getElementById('nm').textContent = S.full_name || S.username;
document.getElementById('cl').textContent = S.class_name ? 'Kelas '+S.class_name : 'Student';
document.getElementById('gr').textContent = '你好，'+(S.full_name||S.username).split(' ')[0]+'！';

// ── MODAL BUTTONS — event listener sekali di sini ─────────────────
document.getElementById('btn-html').onclick = function() {
  if (!sel) return;
  var u = sel;
  closeModal();
  // Catat aktivitas (fire and forget)
  db.from('activity_logs').insert({
    student_id: S.id, action: 'open_unit',
    detail: u.num + ' - HTML', created_at: new Date().toISOString()
  });
  db.from('progress').upsert({
    student_id: S.id, unit_id: u.id, last_opened: new Date().toISOString()
  }, { onConflict: 'student_id,unit_id' });
  // Buka file
  window.open(u.html, '_blank');
};

document.getElementById('btn-docx').onclick = function() {
  if (!sel) return;
  var u = sel;
  closeModal();
  db.from('activity_logs').insert({
    student_id: S.id, action: 'open_unit',
    detail: u.num + ' - DOCX', created_at: new Date().toISOString()
  });
  // Download docx
  var a = document.createElement('a');
  a.href = u.docx;
  a.download = u.docx;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

document.getElementById('btn-close').onclick = closeModal;

document.getElementById('modal').onclick = function(e) {
  if (e.target === this) closeModal();
};

function openModal(unit) {
  sel = unit;
  document.getElementById('m-title').textContent = unit.num + ' · ' + unit.zh;
  document.getElementById('m-desc').textContent  = unit.en + ' — Progress: ' + getAvg(prog[unit.id]) + '%';
  document.getElementById('modal').classList.add('on');
}

function closeModal() {
  document.getElementById('modal').classList.remove('on');
  sel = null;
}

// ── TABS ──────────────────────────────────────────────────────────
function tab(id, el) {
  document.querySelectorAll('.tp').forEach(function(t)  { t.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.getElementById('tp-'+id).classList.add('on');
  el.classList.add('on');
  if (id === 'log') loadLog();
}

function logout() {
  localStorage.removeItem('ty_session');
  window.location.href = 'index.html';
}

// ── HELPERS ───────────────────────────────────────────────────────
function getAvg(p) {
  if (!p) return 0;
  return Math.round(((p.listening_score||0)+(p.reading_score||0)+(p.writing_done?100:0)+(p.speaking_done?100:0))/4);
}

// ── RENDER UNITS ──────────────────────────────────────────────────
function renderUnits() {
  var g = document.getElementById('grid');
  g.innerHTML = '';
  UNITS.forEach(function(u) {
    var p   = prog[u.id];
    var pct = getAvg(p);
    var dn  = pct >= 80;
    var c   = document.createElement('div');
    c.className = 'uc' + (u.on ? '' : ' lk');
    c.innerHTML =
      '<div class="uh'+(dn?' dn':'')+'">'+
        '<div style="font-size:11px;font-weight:700;opacity:.7;letter-spacing:2px;text-transform:uppercase">'+u.num+(dn?' ✅':'')+'</div>'+
        '<div style="font-size:16px;font-weight:900;margin-top:4px;font-family:Noto Sans SC,sans-serif">'+u.zh+'</div>'+
        '<div style="font-size:12px;opacity:.75;margin-top:2px">'+u.en+'</div>'+
        (!u.on ? '<div style="position:absolute;top:14px;right:14px;font-size:18px;opacity:.5">🔒</div>' : '')+
      '</div>'+
      '<div class="ub">'+
        '<div class="upr"><div class="upr-f" style="width:'+pct+'%"></div></div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
          '<span style="font-size:12px;color:var(--gy)">Progress: <strong>'+pct+'%</strong></span>'+
          '<span class="badge '+(u.on?(dn?'b-gr':'b-bl'):'b-gy')+'">'+
            (u.on?(dn?'Selesai':'Aktif'):'Segera')+
          '</span>'+
        '</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:4px">'+
          u.tags.map(function(t){return '<span class="badge b-go">'+t+'</span>';}).join('')+
        '</div>'+
      '</div>';
    if (u.on) {
      (function(unit){ c.onclick = function(){ openModal(unit); }; })(u);
    }
    g.appendChild(c);
  });
}

// ── RENDER PROGRESS TABLE ─────────────────────────────────────────
function renderProg() {
  var tb = document.getElementById('ptbl');
  if (!Object.keys(prog).length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--gy)">Belum ada progress. Mulai belajar!</td></tr>';
    return;
  }
  tb.innerHTML = '';
  UNITS.forEach(function(u) {
    var p = prog[u.id]||{};
    var a = getAvg(p);
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>'+u.num+'</strong><br><span style="font-size:11px;color:var(--gy)">'+u.zh+'</span></td>'+
      [p.listening_score||0, p.reading_score||0].map(function(s){
        return '<td><div style="display:flex;align-items:center;gap:6px">'+
          '<div class="pb"><div class="pbf" style="width:'+s+'%"></div></div>'+
          '<span style="font-size:12px;font-weight:700">'+s+'%</span></div></td>';
      }).join('')+
      '<td>'+(p.writing_done?'✅':'—')+'</td>'+
      '<td>'+(p.speaking_done?'✅':'—')+'</td>'+
      '<td>'+(p.flashcard_done||0)+' kartu</td>'+
      '<td><span class="badge '+(a>=80?'b-gr':a>=50?'b-bl':'b-gy')+'">'+a+'%</span></td>';
    tb.appendChild(tr);
  });
}

// ── RENDER LOG ────────────────────────────────────────────────────
async function loadLog() {
  var box = document.getElementById('logbox');
  box.textContent = 'Memuat...';
  var res = await db.from('activity_logs').select('*')
    .eq('student_id', S.id).order('created_at',{ascending:false}).limit(30);
  var logs = res.data || [];
  if (!logs.length) { box.innerHTML='<div style="color:var(--gy)">Belum ada aktivitas.</div>'; return; }
  var lbl = {login:'🔑 Login',open_unit:'📖 Buka unit',complete_exercise:'✅ Latihan',flip_card:'🃏 Flashcard'};
  box.innerHTML = logs.map(function(l){
    var lb = lbl[l.action]||l.action;
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gyl)">'+
      '<div style="font-size:20px">'+lb.split(' ')[0]+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+lb.slice(lb.indexOf(' ')+1)+'</div>'+
      (l.detail?'<div style="font-size:12px;color:var(--gy)">'+l.detail+'</div>':'')+
      '</div><div style="font-size:11px;color:var(--gy);white-space:nowrap">'+
      new Date(l.created_at).toLocaleString('id-ID')+'</div></div>';
  }).join('');
}

// ── STATS ─────────────────────────────────────────────────────────
function updateStats() {
  var done = Object.values(prog).filter(function(p){return getAvg(p)>=80;}).length;
  var sc = [];
  Object.values(prog).forEach(function(p){sc.push(p.listening_score||0,p.reading_score||0);});
  var avg = sc.length ? Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length) : 0;
  var fl  = Object.values(prog).reduce(function(a,p){return a+(p.flashcard_done||0);},0);
  document.getElementById('h1').textContent = done;
  document.getElementById('h2').textContent = avg+'%';
  document.getElementById('h3').textContent = fl;
}

// ── MAIN LOAD ─────────────────────────────────────────────────────
async function load() {
  var res = await db.from('progress').select('*').eq('student_id', S.id);
  if (res.data) res.data.forEach(function(p){ prog[p.unit_id] = p; });
  renderUnits();
  renderProg();
  updateStats();
}

load();
</script>
</body></html>
